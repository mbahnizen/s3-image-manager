<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <mask id="overlap-mask">
      <rect width="512" height="512" fill="white"/>
      <rect x="72" y="212" width="260" height="200" rx="36" fill="black" stroke="black" stroke-width="32" stroke-linejoin="round"/>
    </mask>
    <clipPath id="front-card-clip">
      <rect x="72" y="212" width="260" height="200" rx="36"/>
    </clipPath>
  </defs>

  <!-- Back Card (Stacked Gallery Indicator) -->
  <rect x="180" y="100" width="260" height="200" rx="36" fill="#0f766e" mask="url(#overlap-mask)"/>

  <!-- Front Card (Image/Photo Representation) -->
  <g clip-path="url(#front-card-clip)">
    <!-- Card Background -->
    <rect x="72" y="212" width="260" height="200" fill="#0f766e"/>
    
    <!-- Accent Sun/Focal Point -->
    <circle cx="140" cy="270" r="32" fill="#f97316"/>
    
    <!-- Landscape Mountain Back -->
    <path d="M 40 412 L 160 280 L 270 380 L 360 412 Z" fill="#0d9488" stroke="#0d9488" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Landscape Mountain Front -->
    <path d="M 110 412 L 240 290 L 360 412 Z" fill="#14b8a6" stroke="#14b8a6" stroke-width="12" stroke-linejoin="round"/>
  </g>
</svg>